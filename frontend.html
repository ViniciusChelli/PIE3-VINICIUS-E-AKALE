<!DOCTYPE html>
<html>
<head>
    <title>EcoPi Dashboard</title>
</head>
<body>
    <h1>🌱 EcoPi Ituiutaba</h1>
    <h2>Temperatura: <span id="temp">--</span> °C</h2>
    <h2>Umidade: <span id="hum">--</span> %</h2>
    <h3>Atualizado: <span id="time">--</span></h3>

    <script>
        async function atualizar() {
            const res = await fetch("http://127.0.0.1:5000/data");
            const data = await res.json();

            document.getElementById("temp").innerText = data.temperatura;
            document.getElementById("hum").innerText = data.umidade;
            document.getElementById("time").innerText = data.timestamp;
        }

        setInterval(atualizar, 2000);
    </script>
</body>
</html>
